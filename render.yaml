services:
  - type: web
    name: expression-training-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: ""
    startCommand: "node server.js"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: practice-media
      - key: OPENAI_API_KEY
        sync: false
